name: Rebuild Issues Manifest

on:
  push:
    branches: [main]
    paths:
      - 'issues/**'

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # Prevent infinite loop: skip when this workflow made the commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to read first-commit dates

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild manifest
        run: |
          cat > rebuild-manifest.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const ISSUES_DIR = 'issues';
          const MANIFEST_PATH = 'data/issues.json';

          fs.mkdirSync(path.dirname(MANIFEST_PATH), { recursive: true });

          const files = fs.readdirSync(ISSUES_DIR)
            .filter(f => /^issue-\d{3}\.html$/.test(f))
            .sort();

          const entries = files.map(filename => {
            const filepath = path.join(ISSUES_DIR, filename);
            const html = fs.readFileSync(filepath, 'utf8');

            const idStr = filename.match(/issue-(\d{3})\.html/)[1];
            const id = parseInt(idStr, 10);

            // Expected <title>: "GTM Field Guide — Issue NNN — Theme"
            const titleMatch = html.match(/<title>([^<]+)<\/title>/i);
            const fullTitle = titleMatch ? titleMatch[1].trim() : `Issue ${idStr}`;
            const parts = fullTitle.split('—').map(s => s.trim());
            const theme = parts.length >= 3
              ? parts.slice(2).join(' — ')
              : fullTitle;

            // First-commit date for this file; falls back to today
            let date;
            try {
              const gitDate = execSync(
                `git log --follow --format=%aI --reverse -- "${filepath}" | head -n 1`,
                { encoding: 'utf8' }
              ).trim();
              date = gitDate || new Date().toISOString();
            } catch {
              date = new Date().toISOString();
            }

            // Preview = <meta name="description"> if routine populated one
            const descMatch = html.match(
              /<meta\s+name=["']description["']\s+content=["']([^"']+)["']/i
            );
            const preview = descMatch ? descMatch[1].trim() : '';

            return {
              id,
              date: date.split('T')[0],
              title: theme,
              path: `/issues/${filename}`,
              preview
            };
          });

          // Sort descending by id (newest first)
          entries.sort((a, b) => b.id - a.id);

          const json = JSON.stringify(entries, null, 2) + '\n';
          const existing = fs.existsSync(MANIFEST_PATH)
            ? fs.readFileSync(MANIFEST_PATH, 'utf8')
            : '';

          if (json === existing) {
            console.log('Manifest unchanged, skipping write.');
            process.exit(0);
          }

          fs.writeFileSync(MANIFEST_PATH, json);
          console.log(`Manifest rebuilt with ${entries.length} entries.`);
          EOF

          node rebuild-manifest.js

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/issues.json 2>/dev/null; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git add data/issues.json
          git commit -m "chore: rebuild issues manifest [skip ci]"
          git push
