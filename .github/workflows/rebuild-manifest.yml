name: Rebuild Issues Manifest

on:
  push:
    branches: [main]
    paths:
      - 'issues/**'

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # Prevent infinite loop: skip when this workflow made the commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history to read first-commit dates

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild manifest
        id: rebuild
        run: |
          cat > rebuild-manifest.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const ISSUES_DIR = 'issues';
          const MANIFEST_PATH = 'data/issues.json';

          fs.mkdirSync(path.dirname(MANIFEST_PATH), { recursive: true });

          const files = fs.readdirSync(ISSUES_DIR)
            .filter(f => /^issue-\d{3}\.html$/.test(f))
            .sort();

          const entries = files.map(filename => {
            const filepath = path.join(ISSUES_DIR, filename);
            const html = fs.readFileSync(filepath, 'utf8');

            const idStr = filename.match(/issue-(\d{3})\.html/)[1];
            const id = parseInt(idStr, 10);

            // Expected <title>: "GTM Field Guide — Issue NNN — Theme"
            const titleMatch = html.match(/<title>([^<]+)<\/title>/i);
            const fullTitle = titleMatch ? titleMatch[1].trim() : `Issue ${idStr}`;
            const parts = fullTitle.split('—').map(s => s.trim());
            const theme = parts.length >= 3
              ? parts.slice(2).join(' — ')
              : fullTitle;

            // First-commit date for this file; falls back to today
            let date;
            try {
              const gitDate = execSync(
                `git log --follow --format=%aI --reverse -- "${filepath}" | head -n 1`,
                { encoding: 'utf8' }
              ).trim();
              date = gitDate || new Date().toISOString();
            } catch {
              date = new Date().toISOString();
            }

            // Preview = <meta name="description"> if routine populated one
            const descMatch = html.match(
              /<meta\s+name=["']description["']\s+content=["']([^"']+)["']/i
            );
            const preview = descMatch ? descMatch[1].trim() : '';

            return {
              id,
              date: date.split('T')[0],
              title: theme,
              path: `/issues/${filename}`,
              preview
            };
          });

          // Sort descending by id (newest first)
          entries.sort((a, b) => b.id - a.id);

          const json = JSON.stringify(entries, null, 2) + '\n';
          const existing = fs.existsSync(MANIFEST_PATH)
            ? fs.readFileSync(MANIFEST_PATH, 'utf8')
            : '';

          // Compute added entries — ones whose id was not in the prior manifest
          let existingIds = new Set();
          if (existing) {
            try {
              const parsed = JSON.parse(existing);
              if (Array.isArray(parsed)) {
                existingIds = new Set(parsed.map(e => e.id));
              }
            } catch {
              // ignore malformed prior manifest
            }
          }
          const newEntries = entries.filter(e => !existingIds.has(e.id));
          fs.writeFileSync('/tmp/new-issues.json', JSON.stringify(newEntries));

          if (json === existing) {
            console.log('Manifest unchanged, skipping write.');
            process.exit(0);
          }

          fs.writeFileSync(MANIFEST_PATH, json);
          console.log(`Manifest rebuilt with ${entries.length} entries (${newEntries.length} new).`);
          EOF

          node rebuild-manifest.js

          # Expose new-issue count as step output
          COUNT=$(node -e "console.log(require('/tmp/new-issues.json').length)")
          echo "new_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/issues.json 2>/dev/null; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git add data/issues.json
          git commit -m "chore: rebuild issues manifest [skip ci]"
          git push

      - name: Notify Telegram
        if: steps.rebuild.outputs.new_count != '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL: https://gtme-field-guide.vercel.app
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping notification."
            exit 0
          fi

          # Send one Telegram message per newly-added issue
          jq -c '.[]' /tmp/new-issues.json | while read -r entry; do
            id=$(printf '%03d' "$(echo "$entry" | jq -r '.id')")
            title=$(echo "$entry" | jq -r '.title')
            path=$(echo "$entry" | jq -r '.path')
            text="📖 GTM Field Guide Issue ${id} shipped — ${title} — ${SITE_URL}${path}"
            http=$(curl -sS -o /tmp/tg.out -w '%{http_code}' \
              -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${text}")
            if [ "$http" != "200" ]; then
              echo "Telegram API returned $http:"
              cat /tmp/tg.out
              exit 1
            fi
            echo "Notified: ${text}"
          done
